extraction:
  modes:
    - local
    - api
    - hybrid
    - local_llm
  default_mode: hybrid
  confidence_thresholds:
    hybrid_escalation: 0.7
    minimum_acceptable: 0.5
    high_confidence: 0.9

batch_processing:
  max_concurrent: 5
  max_batch_size: 100
  timeout_per_document_seconds: 120
  retry_attempts: 3

api:
  openai:
    model: gpt-4
    timeout_seconds: 60
    max_retries: 3
    temperature: 0.0
  anthropic:
    model: claude-3-sonnet-20240229
    timeout_seconds: 60
    max_retries: 3
    temperature: 0.0

local_llm:
  base_url: http://localhost:11434/v1
  model_name: llama3
  api_key: not-needed
  provider: ollama
  timeout_seconds: 120
  max_retries: 3

free_models:
  ocr_engines:
    - name: tesseract
      enabled: true
      config:
        lang: eng
    - name: doctr
      enabled: false
      config:
        det_arch: db_resnet50
        reco_arch: crnn_vgg16_bn
    - name: paddleocr
      enabled: false
      config:
        lang: en
  ner_models:
    - name: spacy_sm
      enabled: true
      config:
        model: en_core_web_sm
    - name: spacy_lg
      enabled: false
      config:
        model: en_core_web_lg
  layout_models:
    - name: doctr_layout
      enabled: false
      config:
        model: db_resnet50

ensemble:
  ocr_engines:
    - tesseract
  ner_models:
    - spacy_sm
  voting_strategy: confidence_weighted
  confidence_threshold: 0.6

supported_file_types:
  - pdf
  - png
  - jpg
  - jpeg
  - tiff
  - docx
  - txt

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: logs/app.log
  max_bytes: 10485760
  backup_count: 5
